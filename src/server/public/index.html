<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>full-stack-auditor</title>
<style>
  :root {
    --bg: #0d1117; --panel: #161b22; --panel2: #0b0f14; --border: #30363d;
    --fg: #e6edf3; --muted: #8b949e; --accent: #58a6ff;
    --green: #3fb950; --teal: #39c5cf; --blue: #58a6ff; --amber: #d29922; --red: #f85149; --gray: #6e7681;
    --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--fg); font: 14px/1.5 system-ui, -apple-system, sans-serif; }
  header { display: flex; align-items: center; gap: 14px; padding: 12px 18px; border-bottom: 1px solid var(--border); background: var(--panel); position: sticky; top: 0; z-index: 5; }
  header h1 { font-size: 15px; margin: 0; font-weight: 600; letter-spacing: .2px; }
  header .sub { color: var(--muted); font-size: 12px; }
  header .spacer { flex: 1; }
  .pill { font-family: var(--mono); font-size: 12px; padding: 3px 9px; border-radius: 999px; border: 1px solid var(--border); color: var(--muted); }
  .pill.live { color: var(--green); border-color: var(--green); }
  button { font: inherit; cursor: pointer; background: #21262d; color: var(--fg); border: 1px solid var(--border); border-radius: 6px; padding: 6px 12px; }
  button:hover { border-color: var(--accent); }
  button.primary { background: var(--accent); color: #03101f; border-color: var(--accent); font-weight: 600; }
  button.danger { color: var(--red); }
  button:disabled { opacity: .45; cursor: default; }
  main { display: grid; grid-template-columns: 380px 1fr; gap: 0; height: calc(100vh - 53px); }
  #list { overflow-y: auto; border-right: 1px solid var(--border); padding: 12px; }
  #detail { overflow-y: auto; padding: 18px 22px; }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; margin-bottom: 10px; cursor: pointer; }
  .card:hover { border-color: var(--accent); }
  .card.sel { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
  .card .row1 { display: flex; align-items: center; gap: 8px; }
  .card .name { font-weight: 600; }
  .card .meta { color: var(--muted); font-size: 12px; margin-top: 2px; }
  .bar { height: 7px; border-radius: 4px; background: #21262d; overflow: hidden; display: flex; margin-top: 9px; }
  .bar > i { display: block; height: 100%; }
  .bar > .audited { background: var(--green); }
  .bar > .pending { background: var(--gray); opacity: .5; }
  .counts { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 9px; }
  .tag { font-family: var(--mono); font-size: 11px; padding: 1px 7px; border-radius: 4px; border: 1px solid var(--border); color: var(--muted); }
  .s-confirmed-differential { color: var(--green); border-color: var(--green); }
  .s-confirmed-executable { color: var(--teal); border-color: var(--teal); }
  .s-confirmed-source { color: var(--blue); border-color: var(--blue); }
  .s-suspected { color: var(--amber); border-color: var(--amber); }
  .s-refuted { color: var(--red); border-color: var(--red); }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; background: var(--gray); }
  .dot.running { background: var(--blue); animation: pulse 1.1s infinite; }
  .dot.done { background: var(--green); } .dot.error { background: var(--red); } .dot.killed { background: var(--gray); }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .3; } }
  h2 { font-size: 16px; margin: 0 0 4px; } h3 { font-size: 13px; text-transform: uppercase; letter-spacing: .6px; color: var(--muted); margin: 22px 0 8px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: left; padding: 6px 8px; border-bottom: 1px solid var(--border); vertical-align: top; }
  th { color: var(--muted); font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; }
  td.mono, .mono { font-family: var(--mono); font-size: 12px; }
  .timeline { color: var(--muted); font-size: 11px; font-family: var(--mono); }
  .actions { display: flex; gap: 8px; margin: 14px 0 4px; flex-wrap: wrap; }
  .empty { color: var(--muted); padding: 40px 0; text-align: center; }
  dialog { background: var(--panel); color: var(--fg); border: 1px solid var(--border); border-radius: 10px; padding: 0; width: min(560px, 92vw); }
  dialog::backdrop { background: rgba(0,0,0,.6); }
  form .body { padding: 18px 20px; max-height: 70vh; overflow-y: auto; }
  form h2 { margin-bottom: 14px; }
  label { display: block; font-size: 12px; color: var(--muted); margin: 10px 0 3px; }
  input, select { width: 100%; background: var(--panel2); color: var(--fg); border: 1px solid var(--border); border-radius: 6px; padding: 7px 9px; font: inherit; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0 12px; }
  .checks { display: flex; gap: 18px; margin-top: 12px; }
  .checks label { display: flex; align-items: center; gap: 6px; margin: 0; color: var(--fg); }
  .checks input { width: auto; }
  .foot { display: flex; justify-content: flex-end; gap: 8px; padding: 14px 20px; border-top: 1px solid var(--border); }
  .hint { color: var(--muted); font-size: 11px; margin-top: 3px; }
</style>
</head>
<body>
<header>
  <h1>full-stack-auditor</h1>
  <span class="sub">multi-project audit tracker</span>
  <span class="spacer"></span>
  <span id="livePill" class="pill">connecting…</span>
  <button class="primary" id="newRunBtn">+ New run</button>
</header>
<main>
  <div id="list"><div class="empty">No projects yet. Start one with “New run”.</div></div>
  <div id="detail"><div class="empty">Select a project, or start a new run.</div></div>
</main>

<dialog id="runDialog">
  <form method="dialog" id="runForm">
    <div class="body">
      <h2>New run</h2>
      <div class="grid2">
        <div><label>Verb</label>
          <select name="verb">
            <option value="run">run — map → audit</option>
            <option value="map">map — enumerate scopes</option>
            <option value="audit">audit — dig inventory/region</option>
            <option value="confirm">confirm — reproduce on real target</option>
          </select></div>
        <div><label>Target (project name)</label><input name="target" required placeholder="my-protocol" /></div>
      </div>
      <label>Source paths (space-separated)</label><input name="sourcePaths" placeholder="./contracts ./src" required />
      <div class="grid2">
        <div><label>Build root</label><input name="buildRoot" placeholder="." /></div>
        <div><label>Corpus paths (space-separated)</label><input name="corpusPaths" placeholder="./docs/specs" /></div>
      </div>
      <div class="grid2">
        <div><label>Provider</label><input name="provider" placeholder="openai-codex" /></div>
        <div><label>Model</label><input name="model" placeholder="(default)" /></div>
      </div>
      <div class="grid2">
        <div><label>Thinking</label>
          <select name="thinking"><option value="">(default)</option><option>minimal</option><option>low</option><option>medium</option><option>high</option><option value="xhigh">xhigh</option></select></div>
        <div><label>Max scopes</label><input name="maxScopes" type="number" min="1" placeholder="10" /></div>
      </div>
      <div class="grid2">
        <div><label>Map steps</label><input name="mapSteps" type="number" min="1" placeholder="(unbounded)" /></div>
        <div><label>Dig steps</label><input name="digSteps" type="number" min="1" placeholder="(unbounded)" /></div>
      </div>
      <div class="grid2">
        <div><label>Dig samples</label><input name="digSamples" type="number" min="1" placeholder="1" /></div>
        <div><label>Dig concurrency</label><input name="digConcurrency" type="number" min="1" placeholder="1" /></div>
      </div>
      <div class="grid2" id="confirmOnly" style="display:none">
        <div><label>Input run dir (confirm)</label><input name="inputRunDir" placeholder="runs/my-protocol-…" /></div>
        <div></div>
      </div>
      <div class="checks">
        <label><input type="checkbox" name="quick" /> quick (breadth)</label>
        <label><input type="checkbox" name="mockLlm" /> mock (offline)</label>
      </div>
      <div class="hint">Budgets are unbounded by default. Continue resumes; Restart re-maps. Source/config are remembered per project.</div>
    </div>
    <div class="foot">
      <button type="button" id="cancelBtn">Cancel</button>
      <button class="primary" id="launchBtn" value="launch">Launch</button>
    </div>
  </form>
</dialog>

<script>
const $ = (sel) => document.querySelector(sel);
let state = { projects: [], active: [], selected: null, detail: null };

function statusTag(status, n) { return '<span class="tag s-' + status + '">' + n + ' ' + status + '</span>'; }
function statusBadge(status) { return '<span class="tag s-' + status + '">' + status + '</span>'; }
function esc(s) { return String(s ?? "").replace(/[&<>]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c])); }
function pct(a, t) { return t > 0 ? Math.round((a / t) * 100) : 0; }

function renderList() {
  const el = $("#list");
  if (state.projects.length === 0) { el.innerHTML = '<div class="empty">No projects yet. Start one with “New run”.</div>'; return; }
  el.innerHTML = state.projects.map((p) => {
    const pr = p.progress || { total: 0, audited: 0, pending: 0 };
    const counts = Object.entries(p.findingCounts || {}).map(([s, n]) => statusTag(s, n)).join(" ");
    const running = p.activeRuns > 0;
    const latest = p.latestRun ? p.latestRun.status : "—";
    return '<div class="card ' + (state.selected === p.name ? "sel" : "") + '" data-name="' + esc(p.name) + '">'
      + '<div class="row1"><span class="dot ' + (running ? "running" : latest) + '"></span><span class="name">' + esc(p.name) + '</span>'
      + '<span class="spacer" style="flex:1"></span><span class="meta">' + p.runCount + ' run' + (p.runCount === 1 ? "" : "s") + '</span></div>'
      + '<div class="meta">scopes ' + pr.audited + '/' + pr.total + ' audited · ' + pr.pending + ' pending' + (running ? ' · <span style="color:var(--blue)">running</span>' : '') + '</div>'
      + '<div class="bar"><i class="audited" style="width:' + pct(pr.audited, pr.total) + '%"></i><i class="pending" style="width:' + pct(pr.pending, pr.total) + '%"></i></div>'
      + (counts ? '<div class="counts">' + counts + '</div>' : '<div class="meta" style="margin-top:8px">' + p.findingsTotal + ' findings</div>')
      + '</div>';
  }).join("");
  el.querySelectorAll(".card").forEach((c) => c.onclick = () => selectProject(c.dataset.name));
}

async function selectProject(name) {
  state.selected = name;
  renderList();
  await refreshDetail();
}

async function refreshDetail() {
  if (!state.selected) return;
  const res = await fetch("/api/projects/" + encodeURIComponent(state.selected));
  state.detail = res.ok ? await res.json() : null;
  renderDetail();
}

function renderDetail() {
  const el = $("#detail");
  const d = state.detail;
  if (!d) { el.innerHTML = '<div class="empty">Select a project, or start a new run.</div>'; return; }
  const cfg = (() => { try { return JSON.parse(d.project.config_json); } catch { return {}; } })();
  const pr = d.progress;
  const running = state.active.filter((a) => a.target === d.project.name);
  const runsRows = d.runs.map((r) => '<tr><td><span class="dot ' + r.status + '"></span> ' + r.kind + '</td><td>' + r.status
    + '</td><td class="mono">' + (r.scopes_audited ?? "-") + "/" + (r.scopes_total ?? "-") + '</td><td class="mono">' + (r.findings_total ?? "-")
    + '</td><td class="mono" style="color:var(--muted)">' + esc((r.run_dir || "").split("/").pop()) + '</td><td class="mono" style="color:var(--muted)">' + esc(r.started_at) + '</td></tr>').join("");
  const findRows = d.findings.map((f) => '<tr><td>' + statusBadge(f.status) + '</td><td>' + esc(f.title)
    + '</td><td class="mono" style="color:var(--muted)">' + esc(f.location) + '</td><td class="timeline">' + d3(f.timeline) + '</td></tr>').join("");
  el.innerHTML =
    '<h2><span class="dot ' + (running.length ? "running" : (d.runs[0] ? d.runs[0].status : "")) + '"></span> ' + esc(d.project.name) + '</h2>'
    + '<div class="meta mono" style="color:var(--muted)">' + esc(cfg.provider || "") + (cfg.model ? " · " + esc(cfg.model) : "") + (cfg.thinking ? " · " + esc(cfg.thinking) : "")
      + " · max-scopes " + (cfg.maxScopes ?? "-") + " · map/dig steps " + (cfg.mapSteps ?? "∞") + "/" + (cfg.digSteps ?? "∞") + '</div>'
    + '<div class="bar" style="margin-top:12px;height:9px"><i class="audited" style="width:' + pct(pr.audited, pr.total) + '%"></i><i class="pending" style="width:' + pct(pr.pending, pr.total) + '%"></i></div>'
    + '<div class="meta">scopes mapped ' + pr.total + ' · audited ' + pr.audited + ' · pending ' + pr.pending + '</div>'
    + '<div class="actions">'
      + '<button class="primary" id="continueBtn">Continue audit</button>'
      + '<button id="restartBtn">Restart (re-map)</button>'
      + (running.length ? running.map((a) => '<button class="danger" data-kill="' + a.pid + '">Stop ' + a.verb + ' (pid ' + a.pid + ')</button>').join("") : "")
    + '</div>'
    + '<h3>Runs (' + d.runs.length + ')</h3>'
    + (d.runs.length ? '<table><tr><th>kind</th><th>status</th><th>scopes</th><th>findings</th><th>dir</th><th>started</th></tr>' + runsRows + '</table>' : '<div class="meta">none</div>')
    + '<h3>Findings (' + d.findings.length + ')</h3>'
    + (d.findings.length ? '<table><tr><th>status</th><th>title</th><th>location</th><th>timeline</th></tr>' + findRows + '</table>' : '<div class="meta">none yet</div>')
    + (d.confirmDecisions.length ? '<h3>Confirm decisions</h3><table><tr><th>bug</th><th>reproduced</th><th>recommendation</th></tr>'
        + d.confirmDecisions.map((c) => '<tr><td>' + esc(c.bug) + '</td><td class="mono">' + esc(c.reproduced) + '</td><td class="mono">' + esc(c.recommendation) + '</td></tr>').join("") + '</table>' : "");
  $("#continueBtn").onclick = () => command("continue", d);
  $("#restartBtn").onclick = () => command("restart", d);
  el.querySelectorAll("[data-kill]").forEach((b) => b.onclick = () => fetch("/api/kill", { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ pid: Number(b.dataset.kill) }) }));
}

function d3(timeline) { return (timeline || []).map((e) => e.to_status).join(" → "); }

function specFromProject(d) {
  const cfg = (() => { try { return JSON.parse(d.project.config_json); } catch { return {}; } })();
  const arr = (v) => { try { return JSON.parse(v) || []; } catch { return []; } };
  return {
    target: d.project.name,
    sourcePaths: arr(d.project.source_paths),
    buildRoot: d.project.build_root || undefined,
    corpusPaths: arr(d.project.corpus_paths),
    provider: cfg.provider, model: cfg.model, thinking: cfg.thinking,
    maxScopes: cfg.maxScopes ?? undefined, mapSteps: cfg.mapSteps ?? undefined, digSteps: cfg.digSteps ?? undefined,
    digSamples: cfg.digSamples ?? undefined, digConcurrency: cfg.digConcurrency ?? undefined,
  };
}

async function command(which, d) {
  await fetch("/api/" + which, { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify(specFromProject(d)) });
}

// --- new-run dialog ---
const dialog = $("#runDialog");
$("#newRunBtn").onclick = () => dialog.showModal();
$("#cancelBtn").onclick = () => dialog.close();
$("#runForm").querySelector("[name=verb]").onchange = (e) => { $("#confirmOnly").style.display = e.target.value === "confirm" ? "grid" : "none"; };
$("#runForm").onsubmit = async (e) => {
  if (e.submitter && e.submitter.id !== "launchBtn") return;
  const f = new FormData($("#runForm"));
  const num = (k) => { const v = f.get(k); return v ? Number(v) : undefined; };
  const list = (k) => { const v = (f.get(k) || "").trim(); return v ? v.split(/\s+/) : []; };
  const spec = {
    verb: f.get("verb"), target: f.get("target"), sourcePaths: list("sourcePaths"),
    buildRoot: f.get("buildRoot") || undefined, corpusPaths: list("corpusPaths"),
    provider: f.get("provider") || undefined, model: f.get("model") || undefined, thinking: f.get("thinking") || undefined,
    maxScopes: num("maxScopes"), mapSteps: num("mapSteps"), digSteps: num("digSteps"),
    digSamples: num("digSamples"), digConcurrency: num("digConcurrency"),
    inputRunDir: f.get("inputRunDir") || undefined,
    quick: f.get("quick") === "on", mockLlm: f.get("mockLlm") === "on",
  };
  await fetch("/api/launch", { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify(spec) });
  setTimeout(() => selectProject(spec.target), 400);
};

// --- live stream ---
function connect() {
  const es = new EventSource("/api/stream");
  es.onmessage = (ev) => {
    const data = JSON.parse(ev.data);
    state.projects = data.projects; state.active = data.active;
    $("#livePill").textContent = (data.active.length ? "● " + data.active.length + " running" : "idle");
    $("#livePill").className = "pill" + (data.active.length ? " live" : "");
    renderList();
    // Refresh the open detail live ONLY while its project has an active run, so an idle
    // project's tables do not re-render (and jump scroll) every tick.
    if (state.selected) {
      const p = state.projects.find((x) => x.name === state.selected);
      if (p && p.activeRuns > 0) refreshDetail();
    }
  };
  es.onerror = () => { $("#livePill").textContent = "reconnecting…"; $("#livePill").className = "pill"; };
}
connect();
</script>
</body>
</html>
